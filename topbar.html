<div class="d-flex align-items-center">

    <button
        id="btnSidebar"
        class="icon-btn me-3">

        <i class="bi bi-list fs-4"></i>

    </button>

    <div class="search-box">

        <input
            id="txtSearch"
            type="text"
            class="form-control"
            placeholder="Caută proprietăți, chiriași sau facturi...">

    </div>

</div>

<div class="top-actions">

    <button
        id="btnRefresh"
        class="icon-btn"
        title="Reîncarcă">

        <i class="bi bi-arrow-clockwise"></i>

    </button>

    <button
        id="btnTheme"
        class="icon-btn"
        title="Light / Dark">

        <i class="bi bi-moon-stars"></i>

    </button>

    <button
        id="btnNotifications"
        class="icon-btn"
        title="Notificări">

        <i class="bi bi-bell"></i>

    </button>

    <div class="user">

        <div class="avatar">

            A

        </div>

        <div>

            <div class="fw-semibold">

                Adi

            </div>

            <small class="text-muted">

                Administrator

            </small>

        </div>

    </div>

</div>
