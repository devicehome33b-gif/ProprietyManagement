<script>

const App = {

    page: "dashboard",

    init() {

        this.bindMenu();
        this.bindTheme();
        this.bindSidebar();
        this.bindRefresh();

        this.updateActiveMenu();

        this.navigate("dashboard");

        console.log("Property Manager pornit");

    },

    bindMenu() {

        document.addEventListener("click", function(e){

            const item = e.target.closest("[data-page]");

            if(!item) return;

            e.preventDefault();

            App.navigate(item.dataset.page);

        });

    },

    bindSidebar(){

        const btn=document.getElementById("btnSidebar");

        if(!btn) return;

        btn.addEventListener("click",function(){

            document
                .getElementById("sidebar")
                .classList.toggle("open");

        });

    },

    bindTheme(){

        const btn=document.getElementById("btnTheme");

        if(!btn) return;

        if(localStorage.getItem("theme")=="dark"){
            document.body.classList.add("dark");
        }

        btn.addEventListener("click",function(){

            document.body.classList.toggle("dark");

            localStorage.setItem(
                "theme",
                document.body.classList.contains("dark")
                ? "dark"
                : "light"
            );

        });

    },

    bindRefresh(){

        const btn=document.getElementById("btnRefresh");

        if(!btn) return;

        btn.addEventListener("click",function(){

            App.navigate(App.page);

            App.toast("Pagina actualizată");

        });

    },

    navigate(page){

        this.page=page;

        this.updateActiveMenu();

        const content=document.getElementById("app-content");

        switch(page){

            case "dashboard":

                content.innerHTML=Pages.dashboard();

                Charts.load();

                break;

            case "properties":

                content.innerHTML=Pages.properties();

                break;

            case "tenants":

                content.innerHTML=Pages.tenants();

                break;

            case "invoices":

                content.innerHTML=Pages.invoices();

                break;

            case "utilities":

                content.innerHTML=Pages.utilities();

                break;

            case "financial":

                content.innerHTML=Pages.financial();

                break;

            case "whatsapp":

                content.innerHTML=Pages.whatsapp();

                break;

            case "reports":

                content.innerHTML=Pages.reports();

                break;

            case "settings":

                content.innerHTML=Pages.settings();

                break;

        }

    },

    updateActiveMenu(){

        document.querySelectorAll("[data-page]").forEach(function(item){

            item.classList.remove("active");

            if(item.dataset.page==App.page){
                item.classList.add("active");
            }

        });

    },

    loader(show){

        const loader=document.getElementById("loader");

        if(!loader) return;

        if(show){

            loader.classList.remove("d-none");

        }else{

            loader.classList.add("d-none");

        }

    },

    toast(message){

        const container=document.getElementById("toastContainer");

        if(!container) return;

        const id="toast"+Date.now();

        container.insertAdjacentHTML("beforeend",

        `<div id="${id}" class="toast show">

            <div class="toast-body">

                ${message}

            </div>

        </div>`);

        setTimeout(function(){

            const t=document.getElementById(id);

            if(t) t.remove();

        },3000);

    }

};
