<style>

:root{

    --primary:#2563eb;
    --primary-dark:#1d4ed8;

    --success:#10b981;
    --warning:#f59e0b;
    --danger:#ef4444;

    --bg:#f4f7fb;
    --card:#ffffff;

    --sidebar:#111827;
    --sidebar-hover:#1f2937;

    --text:#1f2937;
    --text-light:#6b7280;

    --border:#e5e7eb;

    --radius:14px;

    --shadow:0 8px 30px rgba(0,0,0,.08);

    --transition:.25s;

}

body.dark{

    --bg:#111827;

    --card:#1f2937;

    --sidebar:#030712;

    --sidebar-hover:#374151;

    --text:#f9fafb;

    --text-light:#9ca3af;

    --border:#374151;

}

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

    font-family:'Inter',sans-serif;

}

body{

    background:var(--bg);

    color:var(--text);

    overflow:hidden;

}

.app{

    display:flex;

    width:100vw;

    height:100vh;

}

/************************************************/

#sidebar{

    width:260px;

    background:var(--sidebar);

    color:white;

    display:flex;

    flex-direction:column;

    transition:.3s;

    box-shadow:var(--shadow);

}

.sidebar-header{

    padding:25px;

    font-size:24px;

    font-weight:700;

    border-bottom:1px solid rgba(255,255,255,.08);

}

.sidebar-menu{

    flex:1;

    padding:20px 10px;

}

.sidebar-menu a{

    display:flex;

    align-items:center;

    gap:14px;

    padding:14px 18px;

    color:white;

    text-decoration:none;

    border-radius:12px;

    margin-bottom:8px;

    transition:.2s;

}

.sidebar-menu a:hover{

    background:var(--sidebar-hover);

}

.sidebar-menu a.active{

    background:var(--primary);

}

.sidebar-footer{

    padding:18px;

    border-top:1px solid rgba(255,255,255,.08);

    font-size:13px;

    opacity:.7;

}

/************************************************/

#main{

    flex:1;

    display:flex;

    flex-direction:column;

}

/************************************************/

#topbar{

    height:72px;

    background:var(--card);

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:0 25px;

    border-bottom:1px solid var(--border);

}

.search-box{

    width:320px;

}

.search-box input{

    border:none;

    background:#f3f4f6;

    padding:10px 15px;

    width:100%;

    border-radius:10px;

}

body.dark .search-box input{

    background:#374151;

    color:white;

}

.top-actions{

    display:flex;

    gap:20px;

    align-items:center;

}

.icon-btn{

    width:42px;

    height:42px;

    border-radius:50%;

    border:none;

    background:transparent;

    cursor:pointer;

    transition:.2s;

}

.icon-btn:hover{

    background:rgba(0,0,0,.06);

}

body.dark .icon-btn:hover{

    background:#374151;

}

/************************************************/

#app-content{

    flex:1;

    overflow:auto;

    padding:30px;

}

/************************************************/

.cards{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

    gap:20px;

    margin-bottom:25px;

}

.kpi-card{

    background:var(--card);

    border-radius:var(--radius);

    padding:22px;

    box-shadow:var(--shadow);

    transition:.2s;

}

.kpi-card:hover{

    transform:translateY(-3px);

}

.kpi-title{

    color:var(--text-light);

    font-size:14px;

}

.kpi-value{

    font-size:34px;

    font-weight:700;

    margin-top:12px;

}

.kpi-icon{

    float:right;

    font-size:30px;

    color:var(--primary);

}

/************************************************/

.panel{

    background:var(--card);

    border-radius:var(--radius);

    box-shadow:var(--shadow);

    padding:20px;

    margin-bottom:25px;

}

.panel-title{

    font-size:18px;

    font-weight:600;

    margin-bottom:15px;

}

/************************************************/

table{

    width:100%;

    border-collapse:collapse;

}

th{

    text-align:left;

    padding:14px;

    border-bottom:1px solid var(--border);

    color:var(--text-light);

}

td{

    padding:14px;

    border-bottom:1px solid var(--border);

}

tbody tr:hover{

    background:rgba(37,99,235,.05);

}

/************************************************/

.btn-primary{

    background:var(--primary);

    border:none;

    border-radius:10px;

    padding:10px 20px;

}

.btn-primary:hover{

    background:var(--primary-dark);

}

/************************************************/

.badge-success{

    background:var(--success);

    color:white;

}

.badge-warning{

    background:var(--warning);

    color:white;

}

.badge-danger{

    background:var(--danger);

    color:white;

}

.badge{

    padding:6px 12px;

    border-radius:30px;

    font-size:12px;

}

/************************************************/

.loader-overlay{

    position:fixed;

    inset:0;

    background:rgba(255,255,255,.7);

    display:flex;

    justify-content:center;

    align-items:center;

    z-index:9999;

}

body.dark .loader-overlay{

    background:rgba(17,24,39,.8);

}

/************************************************/

.toast{

    border:none;

    border-radius:12px;

}

/************************************************/

.card-chart{

    height:350px;

}

.card-chart canvas{

    width:100% !important;

    height:300px !important;

}

/************************************************/

.user{

    display:flex;

    align-items:center;

    gap:12px;

}

.avatar{

    width:42px;

    height:42px;

    border-radius:50%;

    background:var(--primary);

    color:white;

    display:flex;

    justify-content:center;

    align-items:center;

    font-weight:bold;

}

/************************************************/

::-webkit-scrollbar{

    width:8px;

}

::-webkit-scrollbar-thumb{

    background:#cbd5e1;

    border-radius:20px;

}

body.dark ::-webkit-scrollbar-thumb{

    background:#4b5563;

}

/************************************************/

@media(max-width:992px){

#sidebar{

position:fixed;

left:-260px;

height:100vh;

z-index:999;

}

#sidebar.open{

left:0;

}

#main{

margin-left:0;

}

.cards{

grid-template-columns:1fr;

}

.search-box{

display:none;

}

}

</style>
